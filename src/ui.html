<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #e6e6e6;
      background: #fafafa;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #888;
    }

    .run-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 12px 16px;
      padding: 10px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .run-btn:hover { background: #333; }

    #content { padding: 0 16px 16px; }

    .state-message {
      text-align: center;
      padding: 48px 16px;
      color: #888;
      line-height: 1.6;
    }

    .state-message.error { color: #c0392b; }
    .state-message.success { color: #27ae60; font-weight: 500; }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #e6e6e6;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .summary {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 12px 0 8px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 8px 0 4px;
    }

    .issue-card {
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      border: 1px solid #e6e6e6;
    }

    .issue-card.critical { border-left: 3px solid #e74c3c; }
    .issue-card.warning { border-left: 3px solid #f39c12; }

    .issue-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge.critical { background: #fde8e8; color: #c0392b; }
    .badge.warning { background: #fef3e2; color: #d68910; }

    .layer-name {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    .explanation {
      font-size: 13px;
      line-height: 1.6;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .technical {
      font-size: 11px;
      color: #aaa;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>A11y Explainer</h1>
    <p>Select a frame and run the audit</p>
  </div>
  <button class="run-btn" id="run-btn">Run Accessibility Audit</button>
  <div id="content">
    <div class="state-message">
      <p>Select a frame in Figma<br/>then click Run.</p>
    </div>
  </div>
</body>
</html>
